<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="transicao-suave"></body>
<main class="container">

    <button id="btn-tema" onclick="alternarTema()">
        <i class="fas fa-moon"></i> Modo Escuro
    </button>

    <h1>Sorteador</h1>

<div class="grupo-adicionar">
    <input type="text" id="nome-amigo" placeholder="Digite o nome de um amigo">
    <button onclick="adicionar()">Adicionar</button>
</div>

<button id="btn-gerar" onclick="gerarNomes()">+ Gerar Nomes Aleatórios</button>

<ul id="lista-amigos"></ul>

<div class="grupo-botoes">
    <button id="btn-sortear" onclick="sortear()">Sortear</button>
    <button id="btn-amigo-secreto" onclick="sortearAmigoSecreto()"> Amigo Secreto</button>
    <button id="btn-limpar" onclick="novoSorteio()">Novo Sorteio</button>
</div>

<div class="grupo-historico">
    <h2 class="titulo-historico">
    <i class="fa-solid fa-trophy"></i> Hall da Fama
    </h2>
    <ul id="lista-historico"></ul>
    <button onclick="limparHistorico()">Zerar Histórico</button>
</div>
</main>
<div id="modal-sorteio" class="modal-oculta">
    <div class="modal-cartao">
        <h2 id="titulo-modal"><i class="fas fa-trophy"></i> O Vencedor é <i class="fas fa-trophy"></i></h2>
        
        <div id="texto-vencedor"></div>

        <div class="modal-botoes-container">
            <button onclick="compartilharWhatsApp()" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> Compartilhar
            </button>
            <button onclick="fecharModal()" class="btn-fechar-modal">Fechar</button>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="app.js"></script>
</body>
</html>
